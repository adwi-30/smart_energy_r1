apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-energy-api
  labels:
    app: smart-energy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-energy
  template:
    metadata:
      labels:
        app: smart-energy
    spec:
      containers:
      - name: smart-energy-api
        image: smart-energy-api:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: smart-energy-service
spec:
  selector:
    app: smart-energy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
